<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An accessible GitHub page following WCAG 2.2 AA guidelines.">
  <title>Lori Thomson</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="#main-content">Skip to content</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <h1>Lori Thomson - Accessible Design site</h1>
  </header>

  <main id="main-content">
    <section id="about" aria-labelledby="about-heading">
      <h2 id="about-heading">About Us</h2>
      <p>This is a work in progress, come back soon</p>
    </section>

    <section id="services" aria-labelledby="services-heading">
      <h2 id="services-heading">Services</h2>
      <ul>
        <li>Page 1</li>
        <li>Page 2</li>
        
      </ul>
    </section>

    <section id="contact" aria-labelledby="contact-heading">
      <h2 id="contact-heading">Contact</h2>
      <form action="https://example.com/submit" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required aria-required="true" aria-label="Your full name">
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required aria-required="true" aria-label="Your email address">
        
        <label for="message">Message:</label>
        <textarea id="message" name="message" required aria-required="true" aria-label="Your message"></textarea>
        
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Lori Thomson. All rights reserved.</p>
  </footer>
</body>
</html>
